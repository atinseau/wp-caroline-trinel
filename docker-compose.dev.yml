# ==============================================================================
# Development Stack
# ==============================================================================
# Extends the production compose file. Only overrides what differs for dev.
# Dockerfile.dev extends the production image (wp-caroline-trinel-app:latest).
# All environment variables are loaded from .env.development (source of truth).
# ==============================================================================

services:
  app:
    extends:
      file: docker-compose.yml
      service: app
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env.development
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      # Override WP_HOME which is set to ${SERVICE_URL_APP:-} in production
      # (Coolify variable). environment: takes precedence over env_file:,
      # so we must explicitly set it here for dev.
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      # Docker-specific overrides (not in .env.development)
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    volumes:
      - .:/var/www/html
      - uploads:/var/www/html/web/app/uploads
    networks:
      - internal
    healthcheck:
      disable: true

  db:
    extends:
      file: docker-compose.yml
      service: db
    environment:
      MARIADB_DATABASE: ${DB_NAME:-wordpress}
      MARIADB_USER: ${DB_USER:-wordpress}
      MARIADB_PASSWORD: ${DB_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-wordpress}

  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    networks:
      - internal

volumes:
  db_data:
    driver: local
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
